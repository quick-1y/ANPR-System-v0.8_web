version: '3.9'
services:
  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ../:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.api.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"

  video_gateway:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ../:/app
    command: bash -lc "apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt && uvicorn apps.video_gateway.main:app --host 0.0.0.0 --port 8091"
    ports:
      - "8091:8091"
