version: '3.9'
services:
  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ../:/app
    environment:
      POSTGRES_DSN: "postgresql://anpr:anpr@postgres:5432/anpr"
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.api.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"

  retention_worker:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ../:/app
    environment:
      POSTGRES_DSN: "postgresql://anpr:anpr@postgres:5432/anpr"
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.worker.main:app --host 0.0.0.0 --port 8092"
    ports:
      - "8092:8092"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: anpr
      POSTGRES_USER: anpr
      POSTGRES_PASSWORD: anpr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
