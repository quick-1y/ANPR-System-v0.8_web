version: '3.9'
services:
  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
      SETTINGS_PATH: ${SETTINGS_PATH:-settings.yaml}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.api.main:app --host 0.0.0.0 --port ${API_PORT:-8080}"
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy

  retention_worker:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
      SETTINGS_PATH: ${SETTINGS_PATH:-settings.yaml}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.worker.main:app --host 0.0.0.0 --port ${WORKER_PORT:-8092}"
    ports:
      - "${WORKER_PORT:-8092}:${WORKER_PORT:-8092}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anpr}
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anpr} -d ${POSTGRES_DB:-anpr}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
