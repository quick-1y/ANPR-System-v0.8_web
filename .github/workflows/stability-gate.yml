name: Stability Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  release:
    types: [published, prereleased]
  workflow_dispatch:

jobs:
  stability-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Start API services
        run: |
          python -m anpr.core --host 127.0.0.1 --port 8080 > core.log 2>&1 &
          python -m anpr.video_gateway --host 127.0.0.1 --port 8090 > video.log 2>&1 &
          python -m anpr.event_telemetry --host 127.0.0.1 --port 8100 > events.log 2>&1 &

      - name: Wait for health endpoints
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null \
              && curl -fsS http://127.0.0.1:8090/api/v1/video/health >/dev/null \
              && curl -fsS http://127.0.0.1:8100/api/v1/events/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Services failed to become healthy" >&2
          exit 1

      - name: Run stability suite (gate)
        run: |
          python -m anpr.stability --requests 100 --output reports/stability/stability_gate_report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/stability/stability_gate_report.json").read_text(encoding="utf-8"))
          if report.get("status") != "ok":
              raise SystemExit("Stability gate failed: status is not ok")
          load = report.get("load", {})
          if load.get("error_rate", 1) >= 0.1:
              raise SystemExit("Stability gate failed: error_rate >= 0.1")
          print("Stability gate passed")
          PY

      - name: Upload gate report and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-gate-artifacts
          path: |
            reports/stability/stability_gate_report.json
            core.log
            video.log
            events.log
